name: engine-v2-priors
# Nightly data spine: rebuild Statcast skill priors and publish them through
# the app (public/model/priors.json -> Vercel redeploy on push).
on:
  schedule:
    - cron: "30 9 * * *" # 09:30 UTC = 2:30am PT, after Savant's overnight refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  priors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: frontend-rebuild
      - name: Build priors.json
        run: python3 tools/build_priors.py public/model/priors.json
      - name: Commit if changed
        run: |
          git config user.name "engine-v2-bot"
          git config user.email "noreply@github.com"
          git add public/model/priors.json
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "priors: nightly Statcast refresh"
          git push
